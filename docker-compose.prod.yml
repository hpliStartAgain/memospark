name: memospark

services:
  app:
    container_name: memospark-app
    image: memospark:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      AI_API_KEY: ${AI_API_KEY:?AI_API_KEY is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  nginx:
    container_name: memospark-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      # - "${HTTPS_PORT:-443}:443"    # 取消注释启用 HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./nginx/ssl:/etc/nginx/ssl:ro    # 取消注释挂载 SSL 证书
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
