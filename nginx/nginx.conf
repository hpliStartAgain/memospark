worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── 基本设置 ───────────────────────────────────────────
    sendfile        on;
    keepalive_timeout 65;
    server_tokens off;                    # 隐藏 Nginx 版本号
    client_max_body_size 20m;             # 限制上传大小

    # ── 限流：每个 IP 10 req/s，突发 20 ─────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m     rate=5r/s;

    # ── 日志格式 ───────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── 上游：app 容器 ─────────────────────────────────────
    upstream memospark_app {
        server app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS 重定向（如启用 SSL）──────────────────
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        # listen 443 ssl;                    # 取消注释启用 HTTPS
        # ssl_certificate     /etc/nginx/ssl/cert.pem;
        # ssl_certificate_key /etc/nginx/ssl/key.pem;
        # ssl_protocols TLSv1.2 TLSv1.3;
        # ssl_ciphers HIGH:!aNULL:!MD5;

        # ── 安全头 ─────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── 封禁敏感路径扫描（直接断连，不返回任何内容）─────
        location ~* /\.(env|git|gitconfig|svn|hg|aws|ssh) {
            return 444;
        }
        location ~* /(\.env|env\.|\.gitconfig|\.htaccess|wp-admin|phpmyadmin|\.DS_Store) {
            return 444;
        }
        location ~* /(server/|config/|backup/|db/|sql/) {
            return 444;
        }

        # ── actuator 只允许内网访问 ─────────────────────────
        location /actuator/ {
            allow 172.16.0.0/12;           # Docker 内网
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://memospark_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── API 接口（更严格限流）──────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://memospark_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # AI 请求可能很慢，超时设 120s
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # ── 其余全部转发到 app ──────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://memospark_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（如果用到 SSE）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
