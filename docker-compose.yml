version: "3.8"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-memospark_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-memospark}
      MYSQL_USER: ${MYSQL_USER:-memospark}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-memospark_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-memospark}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-memospark}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-memospark_pass}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_URL: ${AI_API_URL:-https://api.deepseek.com/v1/chat/completions}
      AI_API_MODEL: ${AI_API_MODEL:-deepseek-chat}
      JUDGE0_URL: ${JUDGE0_URL:-https://ce.judge0.com}
      JUDGE0_KEY: ${JUDGE0_KEY:-}
      JUDGE0_HOST: ${JUDGE0_HOST:-}
      JUDGE_TYPE: ${JUDGE_TYPE:-judge0}
      MEMOSPARK_API_KEY: ${MEMOSPARK_API_KEY:-}
    restart: unless-stopped

volumes:
  mysql_data:
