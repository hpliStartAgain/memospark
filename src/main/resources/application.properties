spring.application.name=memospark

# ── MySQL DataSource ────────────────────────────────────────────────────────
# DB_URL:      JDBC URL (default: local dev). CHANGE in production.
# DB_USERNAME: MySQL user.
# DB_PASSWORD: Required — no default. Set via environment variable.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/memospark?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
# ddl-auto=validate: Flyway manages schema; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JDBC batching
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── File upload limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Session security ─────────────────────────────────────────────────────────
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=7d

# ── AI Service (OpenAI-compatible) ───────────────────────────────────────────
# Environment values are global fallbacks; authenticated users can override
# provider/base URL/model/key under Settings. Never commit real API keys.
ai.api.key=${AI_API_KEY:}
ai.api.url=${AI_API_URL:https://token.sensenova.cn/v1}
ai.api.model=${AI_API_MODEL:deepseek-v4-flash}
ai.api.timeout-seconds=${AI_TIMEOUT_SECONDS:120}
ai.api.max-retries=${AI_MAX_RETRIES:2}
ai.settings.encryption-key=${AI_SETTINGS_ENCRYPTION_KEY:${JWT_SECRET:memospark-dev-secret-change-in-production!!}}

# ── Judge / Code Execution ───────────────────────────────────────────────────
# judge.type: judge0 (default) | container (requires Docker)
judge.type=${JUDGE_TYPE:judge0}
judge0.api.url=${JUDGE0_URL:https://ce.judge0.com}
judge0.api.key=${JUDGE0_KEY:}
judge0.api.host=${JUDGE0_HOST:}
# Container judge settings (judge.type=container)
judge.container.image.java=${JUDGE_JAVA_IMAGE:openjdk:17-slim}
judge.container.image.python=${JUDGE_PYTHON_IMAGE:python:3.11-slim}
judge.container.timeout-seconds=${JUDGE_TIMEOUT:10}
judge.container.memory-mb=${JUDGE_MEMORY_MB:256}

# ── Quick-Add API (MCP / external integrations) ──────────────────────────────
# Set MEMOSPARK_API_KEY to enable the /api/quick-add endpoints.
quick.add.api.key=${MEMOSPARK_API_KEY:}

# ── Login rate limiting ───────────────────────────────────────────────────────
security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
security.login.lockout-minutes=${LOGIN_LOCKOUT_MINUTES:15}

# ── API Rate Limiting ─────────────────────────────────────────────────────────
rate.limit.ai.per-min=${AI_RATE_LIMIT_PER_MIN:10}
rate.limit.judge.per-min=${JUDGE_RATE_LIMIT_PER_MIN:5}

# ── Actuator / Health ─────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# ── Logging ───────────────────────────────────────────────────────────────────
# App-level debug so controller/service logs are visible; request filter at INFO.
logging.level.com.memospark=DEBUG
logging.level.com.memospark.core.config.RequestLoggingFilter=INFO
# Tomcat request parsing errors (invalid HTTP method) at DEBUG to avoid noise
logging.level.org.apache.coyote.http11.Http11Processor=WARN
logging.level.org.apache.tomcat.util.net=WARN

# ── JWT (stateless auth for mini-program / API clients) ────────────────────────
jwt.secret=${JWT_SECRET:memospark-dev-secret-change-in-production!!}
jwt.expiry-days=${JWT_EXPIRY_DAYS:30}


# ── WeChat Mini-Program ─────────────────────────────────────────────────────────
wx.app-id=${WX_APP_ID:}
wx.app-secret=${WX_APP_SECRET:}

# ── Password Reset ────────────────────────────────────────────────────────────
password.reset.token-expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:30}
