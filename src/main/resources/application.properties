spring.application.name=memospark

# ── MySQL DataSource ────────────────────────────────────────────────────────
# DB_URL:      JDBC URL (default: local dev). CHANGE in production.
# DB_USERNAME: MySQL user.
# DB_PASSWORD: Required — no default. Set via environment variable.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/memospark?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
# ddl-auto=validate: Flyway manages schema; Hibernate only validates.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JDBC batching
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── File upload limits ───────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Session security ─────────────────────────────────────────────────────────
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=7d

# ── AI Service (OpenAI-compatible) ───────────────────────────────────────────
# AI_API_KEY: Required — no default. Set via environment variable.
ai.api.key=${AI_API_KEY}
ai.api.url=${AI_API_URL:https://api.deepseek.com/v1/chat/completions}
ai.api.model=${AI_API_MODEL:deepseek-chat}
ai.api.timeout-seconds=${AI_TIMEOUT_SECONDS:30}
ai.api.max-retries=${AI_MAX_RETRIES:2}

# ── Judge / Code Execution ───────────────────────────────────────────────────
# judge.type: judge0 (default) | container (requires Docker)
judge.type=${JUDGE_TYPE:judge0}
judge0.api.url=${JUDGE0_URL:https://ce.judge0.com}
judge0.api.key=${JUDGE0_KEY:}
judge0.api.host=${JUDGE0_HOST:}
# Container judge settings (judge.type=container)
judge.container.image.java=${JUDGE_JAVA_IMAGE:openjdk:17-slim}
judge.container.image.python=${JUDGE_PYTHON_IMAGE:python:3.11-slim}
judge.container.timeout-seconds=${JUDGE_TIMEOUT:10}
judge.container.memory-mb=${JUDGE_MEMORY_MB:256}

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Quick-Add API (MCP / external integrations) ──────────────────────────────
# Set MEMOSPARK_API_KEY to enable the /api/quick-add endpoints.
quick.add.api.key=${MEMOSPARK_API_KEY:}

# ── Login rate limiting ───────────────────────────────────────────────────────
security.login.max-attempts=${LOGIN_MAX_ATTEMPTS:5}
security.login.lockout-minutes=${LOGIN_LOCKOUT_MINUTES:15}
