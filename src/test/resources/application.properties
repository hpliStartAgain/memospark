spring.datasource.url=jdbc:h2:mem:memospark;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

ai.api.key=test-key
ai.api.url=http://localhost/v1/chat
ai.api.model=test-model
ai.api.timeout-seconds=1
ai.api.max-retries=0
ai.settings.encryption-key=memospark-test-ai-settings-encryption-key

judge.type=judge0
judge0.api.url=http://localhost/judge0
judge0.api.key=
judge0.api.host=

jwt.secret=memospark-test-secret-change-in-production
jwt.expiry-days=1
